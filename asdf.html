<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asdf</title>
    <style>
        /* 기본 라이트 모드 */
        html {
            color: oklch(0.22 0 200);
            background-color: oklch(0.88 0.4 200);
            font-family: "Noto Sans CJK KR Mono", "Consolas", "MS Gothic", "Ubuntu Mono", "Noto Sans Mono", "Fira code" monospace;
        }

        img, svg {
            width: auto;
        }

        a {
            color: oklch(0.6 0.4 450);
        }
        a:hover {
            color: oklch(0.7 0.5 450);
        }

        del, s {
            color: oklch(0.5 0 200);
        }

        .card {
            background-color: oklch(1 0 200);
            border-radius: 15px;
            width: 300px;
            padding: 20px;
            border: 2pt solid oklch(0.5 0.4 500);
        }

        /* 다크 모드 */
        @media (prefers-color-scheme: dark) {
            html {
                color: oklch(0.88 0 200);
                background-color: oklch(0.22 0.4 200);
            }

            a {
                color: oklch(0.7 0.5 450);
            }

            .card {
                background-color: oklch(0.3 0.2 200);
                border: 2pt solid oklch(0.6 0.4 500);
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>뷁</h1>
    </div>
</body>
</html>
